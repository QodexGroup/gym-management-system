# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Secure Config Injection and Build
        env:
          FIREBASE_ADMIN_CREDENTIALS: ${{ secrets.FIREBASE_ADMIN_CREDENTIALS }}
          VITE_APP_ENV: staging
          VITE_CLOSE_BETA: 'true'
          VITE_API_BASE_URL: https://staging.api.gymhubph.com/api
          VITE_R2_PUBLIC_URL: https://pub-27483e01ea69463095e830b7bb1444c9.r2.dev
        run: |
          echo "$FIREBASE_ADMIN_CREDENTIALS" > ./service-account-key.json
          export GOOGLE_APPLICATION_CREDENTIALS="./service-account-key.json"
          npm run build
          rm ./service-account-key.json
          
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GYMHUBTECH_67E6F }}
          channelId: live
          projectId: gymhubtech-67e6f

      # Post deploy status (success or failure) to Slack #platform-builds.
      # Reuses the same incoming-webhook URL as the Railway notifications.
      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then EMOJI=":white_check_mark:"; else EMOJI=":x:"; fi
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"${EMOJI} *Frontend* deploy *${STATUS}* — \`${GITHUB_REF_NAME}\` @ \`${GITHUB_SHA:0:7}\` by ${GITHUB_ACTOR}\n<${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}|View workflow run>\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"